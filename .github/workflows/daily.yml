name: arXiv-Hep-Agent
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EMAIL_HOST: smtp.163.com
      EMAIL_PORT: 465
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          # 一次性安装所有需要的依赖，确保不遗漏
          pip install feedparser yagmail requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main script
        run: python main.py

      - name: Send email notification
        if: always()
        run: |
          python -c "
          import yagmail
          import os
          import sys
          status = '✅ 成功' if sys.argv[1] == '0' else '❌ 失败'
          try:
              yag = yagmail.SMTP(
                  user=os.environ['EMAIL_USER'],
                  password=os.environ['EMAIL_PASSWORD'],
                  host=os.environ['EMAIL_HOST'],
                  port=os.environ['EMAIL_PORT'],
                  smtp_ssl=True
              )
              yag.send(
                  to=os.environ['EMAIL_TO'],
                  subject=f'arXiv-Hep-Agent 运行{status}',
                  contents=f'任务运行状态：{status}\\n退出码：{sys.argv[1]}'
              )
              print('通知邮件发送成功')
          except Exception as e:
              print('邮件发送失败:', e)
          " ${{ job.status }}
