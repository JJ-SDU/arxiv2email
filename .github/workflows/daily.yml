name: arXiv-Hep-Agent
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EMAIL_HOST: smtp.163.com
      EMAIL_PORT: 465
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser yagmail requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main script
        id: run-main
        run: |
          python main.py
          echo "main_script_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Send detailed email notification
        if: always()
        run: |
          python - << 'EOF'
          import yagmail
          import os
          import sys

          # 从环境变量读取配置
          email_user = os.environ.get('EMAIL_USER')
          email_pass = os.environ.get('EMAIL_PASSWORD')
          email_to = os.environ.get('EMAIL_TO')
          email_host = os.environ.get('EMAIL_HOST', 'smtp.163.com')
          email_port = int(os.environ.get('EMAIL_PORT', 465))
          main_exit_code = os.environ.get('GITHUB_OUTPUT', '').split('main_script_exit_code=')[-1].split('\n')[0] or '0'

          print(f"=== 邮件发送调试信息 ===")
          print(f"发件人: {email_user}")
          print(f"收件人: {email_to}")
          print(f"SMTP服务器: {email_host}:{email_port}")
          print(f"主脚本退出码: {main_exit_code}")

          # 状态判断
          status = '✅ 成功' if main_exit_code == '0' else '❌ 失败'
          subject = f"[arXiv-Hep-Agent] 任务运行{status} ({os.environ.get('GITHUB_RUN_ID', '未知')})"
          contents = f"""
          arXiv-Hep-Agent 任务运行报告
          ==========================
          运行状态: {status}
          主脚本退出码: {main_exit_code}
          运行ID: {os.environ.get('GITHUB_RUN_ID', '未知')}
          触发时间: {os.environ.get('GITHUB_RUN_ATTEMPT', '未知')}
          """

          try:
              # 初始化SMTP连接
              yag = yagmail.SMTP(
                  user=email_user,
                  password=email_pass,
                  host=email_host,
                  port=email_port,
                  smtp_ssl=True,
                  smtp_starttls=False
              )
              # 发送邮件
              yag.send(
                  to=email_to,
                  subject=subject,
                  contents=contents
              )
              print("✅ 通知邮件发送成功！")
          except Exception as e:
              print(f"❌ 邮件发送失败，错误详情: {str(e)}")
              sys.exit(1)
          EOF
